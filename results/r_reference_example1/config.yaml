# High cluster-separation scenario, analogous to the R reference implementation
# (SHAP_preprocessing.Rmd, Synthetic Example I) which used class_sep=1.9 vs
# the Cooper baseline's class_sep=1.0.
#
# The R reference can no longer be reproduced exactly: it relied on
# make_classification parameters that are not available in make_blobs, and the
# SHAP values already differed due to XGBoost (R) vs LightGBM (Python). This
# config preserves the intent -- a dataset with tighter, better-separated
# clusters -- using cluster_std=0.5 instead of the baseline 1.0.

data:
  n_samples: 1000
  n_features: 50
  n_informative: 5
  n_clusters: 6           # 2 classes x 3 subclusters each; class = cluster % 2
  cluster_std: 1.0        # matches make_classification's fixed within-cluster spread
  center_box: [-0.95, 0.95] # = class_sep/2 per axis, matching make_classification class_sep=1.9 with hypercube=True
  random_state: 142

model:
  method: lightgbm
  random_state: 42
  params: {}

attribution:
  method: shap
  target_class: 1

reduction:
  method: umap
  random_state: 42
  params:
    n_components: 2
    n_neighbors: 15
    min_dist: 0.1

clustering:
  method: hdbscan
  params:
    min_cluster_size: 70

evaluation:
  external: [ari, nmi, ami]
  internal: [silhouette, davies_bouldin, calinski_harabasz]
