data:
  n_samples: 1000
  n_features: 50
  n_informative: 5
  n_redundant: 0
  n_repeated: 0
  n_classes: 2
  n_clusters_per_class: 3
  shuffle: false
  random_state: 42        # Cooper did not set this; we add it for reproducibility

attribution:
  method: shap_lgbm
  target_class: 1
  random_state: 42        # LGBMClassifier random_state
  params: {}              # LGBMClassifier defaults (as in Cooper)

reduction:
  method: umap
  random_state: 42        # Cooper did not set this; we add it for reproducibility
  params:
    n_components: 2
    n_neighbors: 200
    min_dist: 0.0         # Cooper uses min_dist=0

clustering:
  method: dbscan
  params:
    eps: 1.5
    min_samples: 20

evaluation:
  external: [ari, nmi, ami]
  internal: [silhouette, davies_bouldin, calinski_harabasz]
