data:
  n_samples: 1000
  n_features: 50
  n_informative: 5
  n_clusters: 6           # 2 classes x 3 subclusters each; class = cluster % 2
  cluster_std: 1.0
  center_box: [-2.0, 2.0] # small range -> cluster overlap in raw space, analogous to make_classification class_sep=1.0
  random_state: 42        # Cooper did not set this; we add it for reproducibility

model:
  method: lightgbm
  random_state: 42        # LGBMClassifier random_state
  params: {}              # LGBMClassifier defaults (as in Cooper)

attribution:
  method: shap
  target_class: 1

reduction:
  method: umap
  random_state: 42        # Cooper did not set this; we add it for reproducibility
  params:
    n_components: 2
    n_neighbors: 200
    min_dist: 0.0         # Cooper uses min_dist=0

clustering:
  method: dbscan
  params:
    eps: 1.5
    min_samples: 20

evaluation:
  external: [ari, nmi, ami]
  internal: [silhouette, davies_bouldin, calinski_harabasz]
