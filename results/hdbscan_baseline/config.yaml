data:
  n_samples: 1000
  n_features: 50
  n_informative: 5
  n_clusters: 6           # 2 classes x 3 subclusters each; class = cluster % 2
  cluster_std: 1.0
  center_box: [-2.0, 2.0] # small range -> cluster overlap in raw space, analogous to make_classification class_sep=1.0
  random_state: 42

model:
  method: lightgbm
  random_state: 42
  params: {}

attribution:
  method: shap
  target_class: 1

reduction:
  method: umap
  random_state: 42
  params:
    n_components: 2
    n_neighbors: 200
    min_dist: 0.0

clustering:
  method: hdbscan
  params:
    min_cluster_size: 70

evaluation:
  external: [ari, nmi, ami]
  internal: [silhouette, davies_bouldin, calinski_harabasz]
