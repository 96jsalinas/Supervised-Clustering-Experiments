# Full method sweep. One run per (attribution x reduction x clustering) combination.
# A single shared model (MLP) is implied but re-trained per combination so seeds stay clean.

data:
  n_samples: 1000
  n_features: 50
  n_informative: 5
  n_clusters: 6
  cluster_std: 1.0
  center_box: [-2.0, 2.0]
  random_state: 42

model:
  method: mlp
  random_state: 42
  params:
    hidden_sizes: [64, 32]
    dropout: 0.1
    epochs: 300
    lr: 0.001
    batch_size: 64
    weight_decay: 0.0001
    val_fraction: 0.2
    patience: 30
    device: cpu

attribution:
  methods: [shap, lrp, lime]
  common:
    target_class: 1
    random_state: 42
  per_method:
    shap:
      background_size: 100
    lrp:
      composite: epsilon_plus_flat
      batch_size: 256
      device: cpu
    lime:
      num_samples: 1000

reduction:
  methods: [umap, pca, tsne, pacmap]
  common:
    random_state: 42
  per_method:
    umap:
      params:
        n_components: 2
        n_neighbors: 200
        min_dist: 0.0
    pca:
      params:
        n_components: 2
    tsne:
      params:
        n_components: 2
        perplexity: 30.0
    pacmap:
      params:
        n_components: 2

clustering:
  methods: [hdbscan, dbscan, kmeans]
  common: {}
  per_method:
    hdbscan:
      params:
        min_cluster_size: 70
    dbscan:
      params:
        eps: 1.5
        min_samples: 5
    kmeans:
      random_state: 42
      params:
        n_clusters: 6
        n_init: 10

evaluation:
  external: [ari, nmi, ami]
  internal: [silhouette, davies_bouldin, calinski_harabasz]
