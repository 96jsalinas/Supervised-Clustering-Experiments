# Full comparison grid for the overnight sweep. Generated once by the
# helper at the bottom of this file; edit that snippet and regenerate if
# the grid structure changes.
#
# Grid structure:
#   - 2 generator families: blobs (rotate_informative=false), rotated (rotate_informative=true)
#   - Data parameter axes, one-at-a-time with baseline shared:
#       n_informative   : {3, 5, 10}
#       n_clusters      : {4, 6, 8}
#       cluster_std     : {0.7, 1.0, 1.3}
#     -> 7 distinct parameter combos per generator
#   - 3 seed replicates per combo
#   -> 42 dataset cells
#   - 2 models: MLP, LightGBM (each with its own tune grid)
#   - method combos: SHAP x {UMAP, PCA} x {HDBSCAN, k-means} = 4
#   -> 42 * 2 * 4 = 336 pipeline runs + 84 tuning sweeps
#
# Launch overnight with:
#   python -m batch.sweep batch/full_comparison_grid.yaml #       --results-dir results_full_comparison 2>&1 | tee -a full_comparison_log.txt
# Then:
#   python -m evaluation.dashboard #       --results-dir results_full_comparison #       --out figures/dashboard_full_comparison

data:
  n_samples: 1000
  n_features: 50
  n_informative: 5
  n_clusters: 6
  cluster_std: 1.0
  center_box: [-2.0, 2.0]
  random_state: 42
  rotate_informative: false

