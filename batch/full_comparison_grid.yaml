models:
- tag: mlp
  method: mlp
  random_state: 42
  params:
    hidden_sizes:
    - 128
    - 64
    activation: relu
    dropout: 0.0
    label_smoothing: 0.0
    lr: 0.001
    epochs: 300
    patience: 40
    batch_size: 64
    weight_decay: 0.0
    val_fraction: 0.2
    standardize: false
  tune:
    enabled: true
    cv:
      n_splits: 5
      shuffle: true
      random_state: 42
    scoring: accuracy
    grid:
      hidden_sizes:
      - - 128
        - 64
      - - 128
        - 64
        - 32
      label_smoothing:
      - 0.0
      - 0.1
      dropout:
      - 0.0
      - 0.2
      lr:
      - 0.001
      - 0.003
- tag: lightgbm
  method: lightgbm
  random_state: 42
  params: {}
  tune:
    enabled: true
    cv:
      n_splits: 5
      shuffle: true
      random_state: 42
    scoring: accuracy
    grid:
      num_leaves:
      - 15
      - 31
      - 63
      learning_rate:
      - 0.05
      - 0.1
      n_estimators:
      - 50
      - 100
      - 200
attribution:
  methods:
  - shap
  common:
    target_class: 1
    random_state: 42
  per_method:
    shap: {}
reduction:
  methods:
  - umap
  - pca
  common:
    random_state: 42
  per_method:
    umap:
      params:
        n_components: 2
        n_neighbors: 200
        min_dist: 0.0
    pca:
      params:
        n_components: 2
clustering:
  methods:
  - hdbscan
  - kmeans
  common: {}
  per_method:
    hdbscan:
      params:
        min_cluster_size: 70
    kmeans:
      random_state: 42
      params:
        n_clusters: 6
        n_init: 10
evaluation:
  external:
  - ari
  - nmi
  - ami
  internal:
  - silhouette
  - davies_bouldin
  - calinski_harabasz
  test_fraction: 0.2
  split_seed: 42
