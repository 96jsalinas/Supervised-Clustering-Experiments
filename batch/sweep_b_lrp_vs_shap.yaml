# Sweep B — LRP vs SHAP, MLP only.
#
# Goal: produce matched-pair attribution comparisons (SHAP and LRP on
# the same MLP, same data) so we can isolate the attribution-method
# effect on subgroup recovery. LightGBM cannot use LRP, so this sweep
# is MLP-only by design; SHAP-only LightGBM data already exists in
# Sweep A's output for cross-reference.
#
# Cell selection rationale
# ------------------------
# Attribution is the single dominant cost on MLP runs (~50-80 s per
# run for SHAP per fig_timings_by_combo from the 24 April sweep), so
# this sweep takes a representative slice rather than the full
# Sweep A grid. The slice covers:
#   - regime variety (informative/noise ratio, cluster count, overlap,
#     dimensionality)
#   - the high-seed-variance `std_*` cells, which need extra replicates
#   - intentionally NO base+nclust_low duplication (already covered by
#     Sweep A; these aren't expected to differentiate SHAP from LRP).
#
# Grid structure
# --------------
#   - 8 distinct parameter combos (subset of Sweep A's 11):
#       baseline, ninf_low, ninf_high, nclust_high, std_low, std_high,
#       nfeat_high, overlap_high
#   - Seed allocation:
#       * 3 seeds for low-variance cells: base, ninf_low, ninf_high,
#         nclust_high, nfeat_high, overlap_high  -> 6 cells x 3 = 18
#       * 5 seeds for high-variance cells: std_low, std_high
#                                       -> 2 cells x 5 = 10
#   - Total dataset cells: 28
#   - Models: MLP only (1)
#   - Attributions: SHAP and LRP (2)
#   - Method combos: {SHAP, LRP} x {UMAP, PCA} x {HDBSCAN, k-means} = 8
#   - Total pipeline runs: 28 * 1 * 8 = 224   (+ 28 tuning passes)
#
# Wall-time estimate
# ------------------
# MLP attribution dominates: ~70 s per run x 224 runs ~ 4.4 h pipeline.
# Tuning (16-combo grid x 5-fold CV x ~3 s per fold) ~ 4 min per cell
# x 28 cells ~ 1.9 h.
# Estimated total: ~6.3 h. Within the ~8 h overnight budget.
#
# Launch overnight with (this file first, then the LGBM control):
#   python -m batch.sweep batch/sweep_b_lrp_vs_shap.yaml \
#       --results-dir results_sweep_b 2>&1 | tee -a sweep_b_log.txt
#   python -m batch.sweep batch/sweep_b_lgbm_control.yaml \
#       --results-dir results_sweep_b 2>&1 | tee -a sweep_b_log.txt
# Then:
#   "/c/Program Files/R/R-4.5.1/bin/x64/Rscript.exe" analyze_sweep.R \
#       results_sweep_b/metrics_table.csv figures/dashboard_sweep_b
#   python -m evaluation.dashboard \
#       --results-dir results_sweep_b \
#       --out figures/dashboard_sweep_b
#
# The companion `sweep_b_lgbm_control.yaml` adds SHAP-LightGBM on the
# same 28 cells (~7 min extra) so the SHAP-vs-LRP comparison has a
# matched-data control. Both write to results_sweep_b/ and the R
# script picks them up together.
#
# Note: fig_ari_by_attribution.png will activate automatically in
# analyze_sweep.R for this sweep since attribution has >1 unique value.

data:
  n_samples: 1000
  n_features: 50
  informative_fraction: 0.2
  n_clusters: 6
  cluster_std: 1.0
  center_box: [-2.0, 2.0]
  random_state: 42
  rotate_informative: false

datasets:
# --- baseline (3 seeds) ---
- {tag: blobs_base_s1,         override: {random_state: 1}}
- {tag: blobs_base_s2,         override: {random_state: 2}}
- {tag: blobs_base_s3,         override: {random_state: 3}}
# --- informative_fraction low (0.1 -> 5 informative at n_features=50) ---
- {tag: blobs_ninf_low_s1,     override: {random_state: 1, informative_fraction: 0.1}}
- {tag: blobs_ninf_low_s2,     override: {random_state: 2, informative_fraction: 0.1}}
- {tag: blobs_ninf_low_s3,     override: {random_state: 3, informative_fraction: 0.1}}
# --- informative_fraction high (0.4 -> 20 informative at n_features=50) ---
- {tag: blobs_ninf_high_s1,    override: {random_state: 1, informative_fraction: 0.4}}
- {tag: blobs_ninf_high_s2,    override: {random_state: 2, informative_fraction: 0.4}}
- {tag: blobs_ninf_high_s3,    override: {random_state: 3, informative_fraction: 0.4}}
# --- n_clusters high (3 seeds) ---
- {tag: blobs_nclust_high_s1,  override: {random_state: 1, n_clusters: 8}}
- {tag: blobs_nclust_high_s2,  override: {random_state: 2, n_clusters: 8}}
- {tag: blobs_nclust_high_s3,  override: {random_state: 3, n_clusters: 8}}
# --- cluster_std low (5 seeds, high seed variance) ---
- {tag: blobs_std_low_s1,      override: {random_state: 1, cluster_std: 0.7}}
- {tag: blobs_std_low_s2,      override: {random_state: 2, cluster_std: 0.7}}
- {tag: blobs_std_low_s3,      override: {random_state: 3, cluster_std: 0.7}}
- {tag: blobs_std_low_s4,      override: {random_state: 4, cluster_std: 0.7}}
- {tag: blobs_std_low_s5,      override: {random_state: 5, cluster_std: 0.7}}
# --- cluster_std high (5 seeds, high seed variance) ---
- {tag: blobs_std_high_s1,     override: {random_state: 1, cluster_std: 1.3}}
- {tag: blobs_std_high_s2,     override: {random_state: 2, cluster_std: 1.3}}
- {tag: blobs_std_high_s3,     override: {random_state: 3, cluster_std: 1.3}}
- {tag: blobs_std_high_s4,     override: {random_state: 4, cluster_std: 1.3}}
- {tag: blobs_std_high_s5,     override: {random_state: 5, cluster_std: 1.3}}
# --- n_features high (3 seeds, more noise dims to stress attribution) ---
- {tag: blobs_nfeat_high_s1,   override: {random_state: 1, n_features: 100}}
- {tag: blobs_nfeat_high_s2,   override: {random_state: 2, n_features: 100}}
- {tag: blobs_nfeat_high_s3,   override: {random_state: 3, n_features: 100}}
# --- overlap_high (3 seeds, tight centroids stress class separation) ---
- {tag: blobs_overlap_high_s1, override: {random_state: 1, center_box: [-1.0, 1.0]}}
- {tag: blobs_overlap_high_s2, override: {random_state: 2, center_box: [-1.0, 1.0]}}
- {tag: blobs_overlap_high_s3, override: {random_state: 3, center_box: [-1.0, 1.0]}}

models:
- tag: mlp
  method: mlp
  random_state: 42
  params:
    hidden_sizes: [128, 64]
    activation: relu
    dropout: 0.0
    label_smoothing: 0.0
    lr: 0.001
    epochs: 300
    patience: 40
    batch_size: 64
    weight_decay: 0.0
    val_fraction: 0.2
    standardize: false
  tune:
    enabled: true
    cv: {n_splits: 5, shuffle: true, random_state: 42}
    scoring: accuracy
    grid:
      hidden_sizes: [[128, 64], [128, 64, 32]]
      label_smoothing: [0.0, 0.1]
      dropout: [0.0, 0.2]
      lr: [0.001, 0.003]

attribution:
  methods: [shap, lrp]
  common:
    target_class: 1
    random_state: 42
  per_method:
    shap: {}
    lrp:
      composite: epsilon_plus_flat
      batch_size: 256
      device: cpu

reduction:
  methods: [umap, pca]
  common:
    random_state: 42
  per_method:
    umap:
      params: {n_components: 2, n_neighbors: 200, min_dist: 0.0}
    pca:
      params: {n_components: 2}

clustering:
  methods: [hdbscan, kmeans]
  common: {}
  per_method:
    hdbscan:
      params: {min_cluster_size: 70}
    kmeans:
      random_state: 42
      params: {n_init: 10}
      auto_select: {enabled: true, k_min: 2, k_max: 15, S: 1.0}

evaluation:
  external: [ari, f_measure, nmi, ami]
  internal: [silhouette, davies_bouldin, calinski_harabasz]
  test_fraction: 0.2
  split_seed: 42
