data:
  n_samples: 1000
  n_features: 50
  n_informative: 5
  n_clusters: 6
  cluster_std: 1.0
  center_box: [-2.0, 2.0]
  random_state: 42

model:
  method: mlp
  random_state: 42
  params:
    hidden_sizes: [128, 64]
    dropout: 0.0
    epochs: 300
    lr: 0.001
    batch_size: 64
    weight_decay: 0.0
    val_fraction: 0.2
    patience: 30
    device: cpu

attribution:
  method: shap
  target_class: 1
  background_size: 100
  random_state: 42

reduction:
  method: umap
  random_state: 42
  params:
    n_components: 2
    n_neighbors: 200
    min_dist: 0.0

clustering:
  method: hdbscan
  params:
    min_cluster_size: 70

evaluation:
  external: [ari, nmi, ami]
  internal: [silhouette, davies_bouldin, calinski_harabasz]
