data:
  n_samples: 1000
  n_features: 50
  n_informative: 5
  n_redundant: 0
  n_repeated: 0
  n_classes: 2
  n_clusters_per_class: 3
  shuffle: false
  random_state: 42

attribution:
  method: shap_lgbm
  target_class: 1
  random_state: 42
  params: {}

reduction:
  method: umap
  random_state: 42
  params:
    n_components: 2
    n_neighbors: 200
    min_dist: 0.0

clustering:
  method: hdbscan
  params:
    min_cluster_size: 70

evaluation:
  external: [ari, nmi, ami]
  internal: [silhouette, davies_bouldin, calinski_harabasz]
