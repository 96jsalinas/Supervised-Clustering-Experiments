# Reproduces the R reference implementation (SHAP_preprocessing.Rmd),
# Synthetic Example I (supervisor: Pablo Morala).
#
# Key differences vs cooper_dbscan that cannot be bridged in Python:
#   - R uses XGBoost (multi:softprob, lr=0.2, nrounds=100); we use LightGBM.
#     SHAP values will differ because the underlying model differs.
#   - R's umap package has its own implementation; Python umap-learn may
#     produce different embeddings even with the same parameters and seed.
#
# Everything else is reproduced exactly.

data:
  n_samples: 1000
  n_features: 50
  n_informative: 5
  n_redundant: 0
  n_repeated: 0
  n_classes: 2
  n_clusters_per_class: 3
  shuffle: false
  random_state: 142
  flip_y: 0
  hypercube: true
  class_sep: 1.9
  # shift and scale are drawn from np.random.seed(142) before make_classification,
  # reproducing: shift = np.random.random(50)*3 - 1.5, scale = np.random.random(50)*2
