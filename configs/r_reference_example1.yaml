attribution:
  method: shap_lgbm
  target_class: 1
  random_state: 42          # R uses set.seed(42) before XGBoost
  params: {}

reduction:
  method: umap
  random_state: 42          # R uses set.seed(42); affects UMAP via R's RNG
  params:
    n_components: 2
    n_neighbors: 15          # R umap package default (vs 200 in Cooper)
    min_dist: 0.1            # R umap package default (vs 0 in Cooper)

clustering:
  method: hdbscan
  params:
    min_cluster_size: 70    # minPts=70 as in R reference Example I

evaluation:
  external: [ari, nmi, ami]
  internal: [silhouette, davies_bouldin, calinski_harabasz]
