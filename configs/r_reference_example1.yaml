# High cluster-separation scenario, intended to occupy the same role as the
# R reference implementation (SHAP_preprocessing.Rmd, Synthetic Example I).
#
# The R reference cannot be reproduced with make_blobs: make_classification
# with hypercube=True places centers exactly at hypercube vertices, guaranteeing
# a minimum inter-center distance of class_sep=1.9. make_blobs draws centers
# uniformly at random, so a center_box of (-0.95, 0.95) (the naive equivalent)
# produces heavier cluster overlap than the R reference. Instead, this config
# uses cluster_std=0.5 with a wider center_box to achieve better-separated
# clusters that serve the same comparative purpose in the experiment set.

data:
  n_samples: 1000
  n_features: 50
  n_informative: 5
  n_clusters: 6           # 2 classes x 3 subclusters each; class = cluster % 2
  cluster_std: 0.5        # tighter blobs -> easier separation, intended to occupy
  center_box: [-2.0, 2.0] # the same role as the R reference's class_sep=1.9 scenario
  random_state: 142

model:
  method: lightgbm
  random_state: 42
  params: {}

attribution:
  method: shap
  target_class: 1

reduction:
  method: umap
  random_state: 42
  params:
    n_components: 2
    n_neighbors: 15
    min_dist: 0.1

clustering:
  method: hdbscan
  params:
    min_cluster_size: 70

evaluation:
  external: [ari, nmi, ami]
  internal: [silhouette, davies_bouldin, calinski_harabasz]
