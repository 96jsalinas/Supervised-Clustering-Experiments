data:
  n_samples: 1000
  n_features: 50
  n_informative: 5
  n_clusters: 6
  cluster_std: 1.0
  center_box: [-2.0, 2.0]
  random_state: 42

model:
  method: lightgbm
  random_state: 42
  params: {}

attribution:
  method: lime
  target_class: 1
  num_samples: 1000
  random_state: 42

reduction:
  method: umap
  random_state: 42
  params:
    n_components: 2
    n_neighbors: 200
    min_dist: 0.0

clustering:
  method: kmeans
  random_state: 42
  params:
    n_clusters: 6
    n_init: 10

evaluation:
  external: [ari, nmi, ami]
  internal: [silhouette, davies_bouldin, calinski_harabasz]
